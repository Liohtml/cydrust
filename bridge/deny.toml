[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "MPL-2.0",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
]

[advisories]
db-urls = ["https://github.com/rustsec/advisory-db"]
unmaintained = "workspace"
ignore = [
    # thiserror 1.0.69 `Error::downcast_mut()` unsoundness. Pulled in
    # transitively (v1 is semver-locked by upstream deps); the app does not
    # rely on the affected code path. Revisit when deps move to thiserror 2.x.
    "RUSTSEC-2026-0190",
]

[bans]
multiple-versions = "warn"
wildcards = "warn"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
