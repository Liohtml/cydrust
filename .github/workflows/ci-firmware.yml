name: CI — Firmware

# NOTE: This workflow typically takes ~15 minutes due to the ESP-IDF toolchain
# bootstrap (espup downloads ~1 GB of Xtensa toolchain + LLVM on first run).
# The Cargo cache significantly reduces subsequent runs.

on:
  push:
    branches: [master, main, develop]
    paths:
      - "firmware/**"
      - ".github/workflows/ci-firmware.yml"
  pull_request:
    paths:
      - "firmware/**"
      - ".github/workflows/ci-firmware.yml"
  workflow_dispatch:

defaults:
  run:
    working-directory: firmware

jobs:
  # ── Firmware build ────────────────────────────────────────────────────────
  build:
    name: Build firmware (ESP32 / xtensa-esp32-espidf)
    runs-on: ubuntu-latest
    # The ESP toolchain setup is non-trivial; allow the job to fail without
    # blocking the rest of CI while the toolchain cache is being established.
    continue-on-error: true

    steps:
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ── esp Rust toolchain (Xtensa) ───────────────────────────────────────
      # Use the xtensa-toolchain action (same as firmware-release.yml). The
      # previous `cargo install espup` approach failed because it ran inside
      # firmware/, whose rust-toolchain.toml pins channel = "esp" — a toolchain
      # that isn't installed yet (chicken-and-egg).
      - name: Install esp Rust toolchain
        uses: esp-rs/xtensa-toolchain@v1.5
        with:
          default: true
          buildtargets: esp32
          ldproxy: true

      # ── Cargo cache ───────────────────────────────────────────────────────
      - name: Cache Cargo registry and build artefacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          # firmware uses a custom target-dir (C:\t on dev; /tmp/fw-target in CI)
          key: ${{ runner.os }}-cargo-firmware-${{ hashFiles('firmware/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-firmware-
            ${{ runner.os }}-cargo-

      # ── Build ─────────────────────────────────────────────────────────────
      - name: Build firmware (no WiFi feature — USB transport only)
        shell: bash
        env:
          # Override the Windows-centric target-dir from .cargo/config.toml
          CARGO_TARGET_DIR: /tmp/fw-target
          ESP_IDF_VERSION: v5.3.2
        run: cargo build --release

      - name: Verify ELF output exists
        shell: bash
        run: |
          ELF=/tmp/fw-target/xtensa-esp32-espidf/release/vibe-firmware
          if [ -f "$ELF" ]; then
            echo "ELF produced successfully: $ELF"
            ls -lh "$ELF"
          else
            echo "ERROR: ELF not found at $ELF"
            exit 1
          fi

      - name: Upload firmware ELF
        uses: actions/upload-artifact@v4
        with:
          name: vibe-firmware-elf
          path: /tmp/fw-target/xtensa-esp32-espidf/release/vibe-firmware
          retention-days: 7
