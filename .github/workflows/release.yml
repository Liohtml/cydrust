name: Release

# Builds the vibe-bridge + serial_bridge binaries for Linux/Windows/macOS and
# publishes them to the GitHub Release for a pushed version tag. The firmware
# .bin image is attached separately by firmware-release.yml (same tag). This
# workflow owns the Release object and its notes (taken from the tag annotation).

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── Build bridge binaries (both bins per platform) ────────────────────────
  build:
    name: Build binaries (${{ matrix.target_label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target_label: linux-x86_64
          - os: windows-latest
            target_label: windows-x86_64
          - os: macos-latest
            target_label: macos-x86_64

    defaults:
      run:
        working-directory: bridge

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install libudev-dev (Linux — required by serialport)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libudev-dev

      # NB: `bridge` is a workspace member, so cargo builds into the
      # workspace-root `target/` (NOT `bridge/target/`).
      - name: Cache Cargo registry and build artefacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('bridge/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-
            ${{ runner.os }}-cargo-

      - name: Build vibe-bridge + serial_bridge (release)
        run: cargo build --release --bin vibe-bridge --bin serial_bridge

      - name: Package archives (Unix)
        if: runner.os != 'Windows'
        working-directory: ${{ github.workspace }}
        run: |
          tar -czf "vibe-bridge-${{ matrix.target_label }}.tar.gz"  -C target/release vibe-bridge
          tar -czf "serial-bridge-${{ matrix.target_label }}.tar.gz" -C target/release serial_bridge

      - name: Package archives (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        working-directory: ${{ github.workspace }}
        run: |
          Compress-Archive -Path target/release/vibe-bridge.exe   -DestinationPath "vibe-bridge-${{ matrix.target_label }}.zip"
          Compress-Archive -Path target/release/serial_bridge.exe -DestinationPath "serial-bridge-${{ matrix.target_label }}.zip"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bridge-binaries-${{ matrix.target_label }}
          path: |
            ${{ github.workspace }}/vibe-bridge-${{ matrix.target_label }}.*
            ${{ github.workspace }}/serial-bridge-${{ matrix.target_label }}.*
          retention-days: 7

  # ── Publish the GitHub Release (tag pushes only) ──────────────────────────
  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract release notes from tag annotation
        id: notes
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          NOTES=$(git tag -l --format='%(contents:body)' "$TAG" 2>/dev/null || true)
          {
            echo "body<<EOF"
            echo "$NOTES"
            echo ""
            echo "---"
            echo "**Binaries** are attached below. See the [README](README.md) for"
            echo "installation instructions and [firmware/RELEASES.md](firmware/RELEASES.md)"
            echo "for flashing the firmware image."
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2.0.8
        with:
          tag_name: ${{ github.ref_name }}
          name: "CYDRUST ${{ github.ref_name }}"
          body: ${{ steps.notes.outputs.body }}
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: dist/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
