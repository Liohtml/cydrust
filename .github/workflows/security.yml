name: Security Audit

on:
  push:
    branches: [master, main]
    paths:
      - "bridge/Cargo.lock"
      - "firmware/Cargo.lock"
      - ".github/workflows/security.yml"
  # Weekly on Monday at 02:00 UTC
  schedule:
    - cron: "0 2 * * 1"
  workflow_dispatch:

jobs:
  # ── cargo-audit (CVE database) ────────────────────────────────────────────
  audit:
    name: cargo-audit (${{ matrix.workspace }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - workspace: bridge
            lock: bridge/Cargo.lock
          - workspace: firmware
            lock: firmware/Cargo.lock

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo-audit binary
        id: cache-audit
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-audit
          key: cargo-audit-${{ runner.os }}-v0.21

      - name: Install cargo-audit
        if: steps.cache-audit.outputs.cache-hit != 'true'
        run: cargo install cargo-audit --locked

      - name: Run cargo-audit on ${{ matrix.workspace }}
        working-directory: ${{ matrix.workspace }}
        env:
          RUSTUP_TOOLCHAIN: stable
        run: |
          # RUSTSEC-2026-0190: thiserror 1.0.69 downcast_mut unsoundness — pulled
          # in transitively (v1 is semver-locked by upstream deps) in both
          # workspaces; not on an exercised code path. See deny.toml.
          if [ "${{ matrix.workspace }}" = "firmware" ]; then
            # atomic-polyfill (RUSTSEC-2023-0089) and proc-macro-error2 (RUSTSEC-2026-0173)
            # are unmaintained but locked to the ESP-IDF toolchain ecosystem; we cannot update them.
            cargo audit --deny warnings \
              --ignore RUSTSEC-2023-0089 \
              --ignore RUSTSEC-2026-0173 \
              --ignore RUSTSEC-2026-0190
          else
            cargo audit --deny warnings \
              --ignore RUSTSEC-2026-0190
          fi

  # ── cargo-deny (licenses + advisories + duplicates) ───────────────────────
  deny:
    name: cargo-deny (${{ matrix.workspace }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - workspace: bridge
          - workspace: firmware

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run cargo-deny
        uses: EmbarkStudios/cargo-deny-action@v2
        env:
          # firmware/rust-toolchain.toml specifies channel = "esp" which is not
          # installed in the cargo-deny Docker image; stable overrides it.
          RUSTUP_TOOLCHAIN: stable
        with:
          # Each workspace provides its own deny.toml (or falls back to root)
          manifest-path: ${{ matrix.workspace }}/Cargo.toml
