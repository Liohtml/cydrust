name: Security Audit

on:
  push:
    branches: [main]
    paths:
      - "bridge/Cargo.lock"
      - "firmware/Cargo.lock"
      - ".github/workflows/security.yml"
  # Weekly on Monday at 02:00 UTC
  schedule:
    - cron: "0 2 * * 1"
  workflow_dispatch:

jobs:
  # ── cargo-audit (CVE database) ────────────────────────────────────────────
  audit:
    name: cargo-audit (${{ matrix.workspace }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - workspace: bridge
            lock: bridge/Cargo.lock
          - workspace: firmware
            lock: firmware/Cargo.lock

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo-audit binary
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-audit
          key: cargo-audit-${{ runner.os }}-v0.21

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run cargo-audit on ${{ matrix.workspace }}
        working-directory: ${{ matrix.workspace }}
        run: cargo audit --deny warnings

  # ── cargo-deny (licenses + advisories + duplicates) ───────────────────────
  deny:
    name: cargo-deny (${{ matrix.workspace }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - workspace: bridge
          - workspace: firmware

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run cargo-deny
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          # Each workspace provides its own deny.toml (or falls back to root)
          manifest-path: ${{ matrix.workspace }}/Cargo.toml
          command: check
          arguments: >-
            advisories
            licenses
            bans
            sources
