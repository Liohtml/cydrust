name: Label PRs

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

jobs:
  label:
    name: Apply labels
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: actions/labeler@v5
        with:
          repo-token: ${{ github.token }}
          configuration-path: .github/labeler.yml
